name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Vital for fetching local psiphon submodules

    # FIX: Uses the official gradle caching logic native to the setup-java action
    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle' 

    # FIX: Explicitly setup and update Android SDK components
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    - name: Initialize EmbeddedValues Configuration
      run: |
        cp app/src/main/java/com/psiphon3/psiphonlibrary/EmbeddedValues.java.stub app/src/main/java/com/psiphon3/psiphonlibrary/EmbeddedValues.java

    # FIX: Force a clean download of missing internal dependencies via refresh-dependencies
    - name: Build Debug APK
      run: ./gradlew assembleDebug --refresh-dependencies --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: psiphon-debug-apk
        path: app/build/outputs/apk/debug/*.apk
