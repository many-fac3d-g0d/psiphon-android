name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    # FIX: Initialize the missing EmbeddedValues file using the repository stub
    - name: Initialize EmbeddedValues Configuration
      run: |
        cp app/src/main/java/com/psiphon3/psiphonlibrary/EmbeddedValues.java.stub app/src/main/java/com/psiphon3/psiphonlibrary/EmbeddedValues.java

    - name: Cache Gradle Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: psiphon-debug-apk
        path: app/build/outputs/apk/debug/*.apk
